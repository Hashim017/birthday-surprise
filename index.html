<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(270deg, #ff6ec4, #7873f5, #ff6ec4);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

h1 {
  font-size: 3rem;
  animation: fadeIn 2s ease;
}

p {
  font-size: 1.5rem;
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4da6;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #ff4da6;
  color: white;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) scale(1.5);
    opacity: 0;
  }
}

.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(0,0,0,0.8);
  padding: 30px;
  border-radius: 20px;
  width: 80%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255,255,255,0.3);
  transition: 0.5s ease;
  opacity: 0;
}

.card h2 {
  color: #ff4da6;
}

.card.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="typing"></h1>
  <p>You are the best thing in my life ❤️</p>
  <button onclick="surprise()">Click Me 🎁</button>
</div>
<div id="card" class="card">
  <h2>For You ❤️</h2>
  <p>
    You are not just my best friend…  
    you are my happiness, my safe place, and my favorite person.  

    I’m so lucky to have you in my life.  
    Happy Birthday once again 🎂❤️
  </p>
</div>

<script>
// Typing effect
const text = "Happy Birthday 🎂❤️";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 100);
  }
}
typeEffect();

// Floating hearts generator
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

// Surprise button
function surprise() {
  document.getElementById("card").classList.add("show");
}
</script>

</body>
</html>
