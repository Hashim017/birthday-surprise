<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Arish❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  background: linear-gradient(270deg, #ff6ec4, #7873f5, #ff6ec4);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

h1 {
  font-size: clamp(2rem, 6vw, 3.5rem);
  animation: fadeIn 2s ease;
}

p {
  font-size: clamp(1.2rem, 4.5vw, 1.8rem);
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 14px 28px;
  font-size: clamp(1rem, 4vw, 1.3rem);
}

button:hover {
  transform: scale(1.1);
  background: #ff4da6;
  color: white;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.heart {
  position: absolute;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) scale(1.5);
    opacity: 0;
  }
}

.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.6);
  background: rgba(0,0,0,0.9);
  padding: clamp(20px, 5vw, 35px);
  border-radius: 25px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,255,255,0.25);
  transition: all 0.4s ease;
  opacity: 0;
  backdrop-filter: blur(10px);
}

/* SHOW STATE */
.card.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.card h2 {
  font-size: clamp(2rem, 6vw, 2.5rem);
  margin-bottom: 12px;
  background: linear-gradient(45deg, #ff6ec4, #ff9a9e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s ease-in-out infinite alternate;
}

.card.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="typing"></h1>
  <p>You are the best thing in my life ❤️</p>
  <button onclick="surprise()">Click Me 🎁</button>
</div>
<div id="card" class="card">
  <h2>For You ❤️</h2>
  <p>
    You are not just my dude…  
    you are my happiness, my safe place, and my favorite person.  

    I’m so lucky to have you in my life.  
    Happy Birthday once again 🎂❤️
  </p>
</div>

<script>
// Typing effect
const text = "Happy Birthday 🎂❤️";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 100);
  }
}
typeEffect();

// Floating hearts generator
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

// Surprise button
function surprise() {
  document.getElementById("card").classList.add("show");
}
</script>

</body>
</html>
